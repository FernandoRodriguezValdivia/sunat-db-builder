name: Build SUNAT SQLite

on:
  schedule:
    # Todos los días 02:00 AM hora Perú aproximadamente UTC-5, que es 07:00 AM UTC
    # GitHub usa UTC
    - cron: '0 7 * * *'

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Generar SQLite
        run: |
          python scripts/build_sqlite.py

      - name: Verificar resultado
        run: |
          ls -lh output/

      - name: Verificar que exista la BD
        run: |
          test -f output/sunat.sqlite

      - name: Subir SQLite a Turso
        env:
          TURSO_DATABASE_TOKEN: ${{ secrets.TURSO_DATABASE_TOKEN }}
          TURSO_HOST: ${{ secrets.TURSO_HOST }}
        run: |
          SIZE=$(stat -c%s output/sunat.sqlite)

          echo "Tamaño SQLite: $SIZE bytes"

          curl \
            --fail \
            --show-error \
            --silent \
            -X POST \
            -H "Authorization: Bearer $TURSO_DATABASE_TOKEN" \
            -H "Content-Length: $SIZE" \
            --data-binary @output/sunat.sqlite \
            "https://$TURSO_HOST/v1/upload"

          echo "SQLite subida correctamente a Turso."